name: Go Cross-Platform Build and Release

permissions:
  contents: write

on:
  push:
    branches: [ main ]

jobs:
  build-executable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o aop-linux-amd64 ./cmd

      - uses: softprops/action-gh-release@v2
        with:
          name: Latest
          tag_name: latest
          files: aop-linux-amd64